services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/realm-config.json
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json:ro
      - keycloak_data:/opt/keycloak/data
    command: ["start-dev", "--import-realm"]
    restart: unless-stopped

  devtoken:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    volumes:
      - ./keycloak:/tokens
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idklol_characters
      POSTGRES_USER: idklol
      POSTGRES_PASSWORD: idklol_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idklol -d idklol_characters"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-model-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "qwen2.5:1.5b"]
    depends_on:
      ollama:
        condition: service_started
    restart: "no"

  npc-interactions-bridge:
    image: idklol-server-npc-interactions-bridge:prod
    build:
      context: .
      dockerfile: npc-interactions-bridge/Dockerfile
    stdin_open: true
    tty: true
    environment:
      NATS_URL: nats://nats:4222
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      NPC_BRIDGE_REQUEST_SUBJECT: npc.interactions.request
      NPC_BRIDGE_RESPONSE_SUBJECT: npc.interactions.response
      NPC_BRIDGE_PROMPTS_DIR: /srv/prompts
      NPC_BRIDGE_DEFAULT_PROMPT: default/system
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      nats:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-model-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  chatserver:
    profiles: ["grpc"]
    build:
      context: .
      dockerfile: chat/Dockerfile
    ports:
      - "50052:50052"
    environment:
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      - keycloak
    restart: unless-stopped

  characters-grpc:
    profiles: ["grpc"]
    build:
      context: .
      dockerfile: characters/Dockerfile
      args:
        BINARY_NAME: characters-grpc
    ports:
      - "50053:50052"
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  characters-admin:
    build:
      context: .
      dockerfile: characters/Dockerfile
      args:
        BINARY_NAME: characters-admin
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  characters-server:
    build:
      context: .
      dockerfile: characters/Dockerfile
      args:
        BINARY_NAME: characters-server
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  npc-metadata-service:
    build:
      context: .
      dockerfile: npc-metadata-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_npc_metadata
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
      TRACING_OTLP_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRACING_SAMPLE_RATIO: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  ue-server:
    build:
      context: ../idklol-client
      dockerfile: Dockerfile.server
    ports:
      - "7777:7777/udp"
      - "7787:7787/udp"
    environment:
      MAP_PATH: "/Game/ThirdPerson/Maps/ThirdPersonMap"
      GAME_PORT: "7777"
      NATS_URL: "nats://nats:4222"
      INSTANCE_ID: "server-1"
      LOG_LEVEL: "Log"
    depends_on:
      characters-server:
        condition: service_started
      nats:
        condition: service_healthy
    restart: unless-stopped

  webadmin:
    build:
      context: ./webadmin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-in-production-use-openssl-rand-base64-32
      KEYCLOAK_ID: idklol-webadmin
      KEYCLOAK_SECRET: webadmin-client-secret-12345
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/idklol
      NATS_URL: nats://nats:4222
    depends_on:
      keycloak:
        condition: service_started
      nats:
        condition: service_healthy
      characters-admin:
        condition: service_started
    restart: unless-stopped

  loki:
    profiles: ["observability"]
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/config.yml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/tmp/tempo
    restart: unless-stopped

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otel-collector/config.yml:ro
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:
  ollama_data:
  loki_data:
  promtail_positions:
  tempo_data:
  prometheus_data:
  grafana_data:
