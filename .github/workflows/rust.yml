# ─── Rust Services — Test, Build & Docker Push ──────────────────────────────
#
# IMAGE TAG STRATEGY
# ------------------
#   push to main  →  :latest + :<short-sha> for every service image
#   tag  v*.*.*   →  :<semver> + :latest
#
# IMAGES PRODUCED
# ---------------
#   ghcr.io/<owner>/<repo>-characters-grpc
#   ghcr.io/<owner>/<repo>-characters-admin
#   ghcr.io/<owner>/<repo>-characters-server
#   ghcr.io/<owner>/<repo>-chatserver
#   ghcr.io/<owner>/<repo>-npc-interactions-bridge
#   ghcr.io/<owner>/<repo>-npc-metadata-service
#   ghcr.io/<owner>/<repo>-webadmin

name: Rust

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # ── 1. Test ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Contract schema alignment tests (npc-metadata-service)
        run: cargo test -p idklol-npc-metadata-service models::npc::tests -- --nocapture

  # ── 2. Docker — build & push all service images ─────────────────────────────
  docker:
    name: Docker (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: test
    # Only push on main branch or version tags; PRs just build (no push)
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: characters-grpc
            context: .
            dockerfile: characters/Dockerfile
            build_args: "BINARY_NAME=characters-grpc"
          - name: characters-admin
            context: .
            dockerfile: characters/Dockerfile
            build_args: "BINARY_NAME=characters-admin"
          - name: characters-server
            context: .
            dockerfile: characters/Dockerfile
            build_args: "BINARY_NAME=characters-server"
          - name: chatserver
            context: .
            dockerfile: chat/Dockerfile
            build_args: ""
          - name: npc-interactions-bridge
            context: .
            dockerfile: npc-interactions-bridge/Dockerfile
            build_args: ""
          - name: npc-metadata-service
            context: .
            dockerfile: npc-metadata-service/Dockerfile
            build_args: ""
          - name: webadmin
            context: ./webadmin
            dockerfile: webadmin/Dockerfile
            build_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
