services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/realm-config.json
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json:ro
      - keycloak_data:/opt/keycloak/data
    command: ["start-dev", "--import-realm"]
    restart: unless-stopped

  devtoken:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    volumes:
      - ./keycloak:/tokens
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idklol_characters
      POSTGRES_USER: idklol
      POSTGRES_PASSWORD: idklol_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idklol -d idklol_characters"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatserver:
    build:
      context: .
      dockerfile: chat/Dockerfile.dev
    ports:
      - "50052:50052"
    environment:
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - chat_target:/app/target
    depends_on:
      - keycloak
    restart: unless-stopped

  characters-grpc:
    build:
      context: .
      dockerfile: characters/Dockerfile.dev
    ports:
      - "50053:50052"
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: debug
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    command: ["cargo", "watch", "-x", "run --bin characters-grpc"]
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - characters_target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  characters-admin:
    build:
      context: .
      dockerfile: characters/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-webadmin
      KEYCLOAK_CLIENT_SECRET: webadmin-client-secret-12345
      NATS_URL: nats://nats:4222
      LOG_LEVEL: debug
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    command: ["cargo", "run", "--bin", "characters-admin"]
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - characters_target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  characters-server:
    build:
      context: .
      dockerfile: characters/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      NATS_URL: nats://nats:4222
      LOG_LEVEL: debug
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    command: ["cargo", "watch", "-x", "run --bin characters-server"]
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - characters_target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # ue-server is opt-in (requires a pre-packaged Linux server build at ../idklol-client/LinuxServerPackage/)
  # Start with: docker compose -f docker-compose.dev.yml --profile ue up
  ue-server:
    profiles: ["ue"]
    build:
      context: ../idklol-client
      dockerfile: Dockerfile.server
    ports:
      - "7777:7777/udp"
      - "7787:7787/udp"
    environment:
      MAP_PATH: "/Game/ThirdPerson/Maps/ThirdPersonMap"
      GAME_PORT: "7777"
      NATS_URL: "nats://nats:4222"
      INSTANCE_ID: "dev-server-1"
      LOG_LEVEL: "VeryVerbose"
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  webadmin:
    build:
      context: ./webadmin
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      KEYCLOAK_ID: idklol-webadmin
      KEYCLOAK_SECRET: webadmin-client-secret-12345
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/idklol
      NATS_URL: nats://nats:4222
    volumes:
      - ./webadmin:/app:cached
      - /app/node_modules
    depends_on:
      keycloak:
        condition: service_started
      nats:
        condition: service_healthy
      characters-admin:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:
  cargo_registry:
  cargo_git:
  chat_target:
  characters_target:
