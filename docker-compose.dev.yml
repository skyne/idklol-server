services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/realm-config.json
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json:ro
      - keycloak_data:/opt/keycloak/data
    command: ["start-dev", "--import-realm"]
    restart: unless-stopped

  devtoken:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    volumes:
      - ./keycloak:/tokens
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idklol_characters
      POSTGRES_USER: idklol
      POSTGRES_PASSWORD: idklol_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idklol -d idklol_characters"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatserver:
    build:
      context: .
      dockerfile: chat/Dockerfile.dev
    ports:
      - "50052:50052"
    environment:
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: info
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - chat_target:/app/target
    depends_on:
      - keycloak
    restart: unless-stopped

  characterserver:
    build:
      context: .
      dockerfile: characters/Dockerfile.dev
    ports:
      - "50053:50052"
    environment:
      DATABASE_URL: postgresql://idklol:idklol_dev_password@postgres:5432/idklol_characters
      KEYCLOAK_URL: http://keycloak:8080/realms/idklol
      KEYCLOAK_CLIENT_ID: idklol-chat
      KEYCLOAK_CLIENT_SECRET: chat-client-secret-12345
      LOG_LEVEL: debug
      LOG_OUTPUT: console
      LOG_FORMAT: plain
    volumes:
      # Mount source code for live editing
      - ./:/app:cached
      # Cache cargo registry and build artifacts for faster rebuilds
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - characters_target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:
  cargo_registry:
  cargo_git:
  chat_target:
  characters_target:
